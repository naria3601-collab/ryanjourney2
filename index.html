<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RyanJourney — Second Brain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0b0d;
  --panel:#121418;
  --panel-2:#181b20;
  --border:#23262c;
  --text:#e9eaec;
  --muted:#8a8f99;
  --muted-2:#5d626c;
  --accent:#4f7cff;
  --accent-dim:#4f7cff22;
  --accent-line:#4f7cff55;
  --danger:#e5595f;
  --good:#4fd18b;
  --radius:10px;
  --shadow:0 8px 30px rgba(0,0,0,.35);
  --font-display:'Sora',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html.light{
  --bg:#f5f6f8;
  --panel:#ffffff;
  --panel-2:#eef0f3;
  --border:#dfe2e7;
  --text:#14161a;
  --muted:#5c626d;
  --muted-2:#8a8f99;
  --accent:#3358e0;
  --accent-dim:#3358e015;
  --accent-line:#3358e044;
  --shadow:0 8px 30px rgba(20,22,26,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background .25s ease,color .25s ease;
}
::selection{background:var(--accent-line);}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted-2);}

#app{display:flex;height:100vh;width:100vw;}

/* ---------- Sidebar ---------- */
.sidebar{
  width:250px;min-width:250px;
  background:var(--panel);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  height:100vh;
  transition:transform .25s ease;
}
.brand{
  padding:20px 18px 14px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);
}
.brand-mark{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(145deg,var(--accent),#1f3fae);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:800;font-size:15px;color:#fff;
  flex-shrink:0;
}
.brand-text{font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:.2px;}
.brand-sub{font-size:10.5px;color:var(--muted);font-family:var(--font-mono);margin-top:1px;}

.sidebar-scroll{flex:1;overflow-y:auto;padding:10px 10px 16px;}
.nav-section-label{
  font-size:10.5px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted-2);
  padding:14px 10px 6px;font-weight:600;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:8px;cursor:pointer;
  font-size:13.5px;color:var(--muted);
  transition:background .15s ease,color .15s ease;
  user-select:none;
}
.nav-item:hover{background:var(--panel-2);color:var(--text);}
.nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:600;}
.nav-badge{
  width:22px;height:22px;border-radius:6px;background:var(--panel-2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:10.5px;font-weight:700;font-family:var(--font-mono);color:var(--muted);
}
.nav-item.active .nav-badge{background:var(--accent);color:#fff;}
.nav-count{margin-left:auto;font-size:10.5px;color:var(--muted-2);font-family:var(--font-mono);}

.sidebar-footer{padding:12px 14px;border-top:1px solid var(--border);}
.theme-toggle{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--panel-2);border:1px solid var(--border);border-radius:8px;
  padding:6px 10px;cursor:pointer;font-size:12px;color:var(--muted);
}

/* ---------- Main ---------- */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{
  display:flex;align-items:center;gap:12px;
  padding:14px 26px;border-bottom:1px solid var(--border);
  background:var(--bg);flex-shrink:0;
}
.menu-btn{display:none;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;}
.breadcrumb{font-size:12.5px;color:var(--muted);font-family:var(--font-mono);flex-shrink:0;}
.breadcrumb b{color:var(--text);font-weight:600;}
.search-shell{
  flex:1;max-width:440px;margin:0 auto;
  display:flex;align-items:center;gap:8px;
  background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:7px 12px;color:var(--muted);cursor:pointer;
  font-size:12.5px;
}
.search-shell kbd{
  margin-left:auto;font-family:var(--font-mono);font-size:10.5px;
  background:var(--panel-2);border:1px solid var(--border);border-radius:5px;padding:1px 6px;
}
.icon-btn{
  width:34px;height:34px;border-radius:8px;border:1px solid var(--border);
  background:var(--panel);color:var(--muted);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;flex-shrink:0;
}
.icon-btn:hover{color:var(--text);border-color:var(--muted-2);}

.content{flex:1;overflow-y:auto;padding:26px 34px 60px;position:relative;}
.content-inner{max-width:1180px;margin:0 auto;}

/* ---------- Typography helpers ---------- */
h1.page-title{font-family:var(--font-display);font-weight:700;font-size:26px;letter-spacing:-.3px;}
.page-sub{color:var(--muted);font-size:13.5px;margin-top:4px;}
.eyebrow{font-family:var(--font-mono);font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}

/* ---------- Cards ---------- */
.grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));margin-top:22px;}
.cat-card{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;cursor:pointer;position:relative;overflow:hidden;
  transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease;
}
.cat-card:hover{transform:translateY(-3px);border-color:var(--accent-line);box-shadow:var(--shadow);}
.cat-card .badge{
  width:34px;height:34px;border-radius:9px;background:var(--panel-2);
  display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);
  font-weight:700;font-size:13px;color:var(--accent);margin-bottom:12px;
  transition:background .18s ease,color .18s ease;
}
.cat-card:hover .badge{background:var(--accent);color:#fff;}
.cat-card .name{font-family:var(--font-display);font-weight:600;font-size:14.5px;}
.cat-card .count{font-size:11.5px;color:var(--muted);margin-top:3px;font-family:var(--font-mono);}

.stats-row{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-top:18px;}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:15px 16px;}
.stat-num{font-family:var(--font-display);font-size:24px;font-weight:700;}
.stat-label{font-size:11.5px;color:var(--muted);margin-top:2px;}

.section-block{margin-top:34px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-head h2{font-family:var(--font-display);font-size:15.5px;font-weight:600;}
.link-btn{background:none;border:none;color:var(--accent);font-size:12.5px;cursor:pointer;font-family:var(--font-body);}

.chart-wrap{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-top:18px;}
.chart-bars{display:flex;align-items:flex-end;gap:10px;height:120px;margin-top:14px;}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.chart-bar{width:100%;background:linear-gradient(180deg,var(--accent),var(--accent-line));border-radius:5px 5px 2px 2px;transition:height .4s ease;}
.chart-day{font-size:10px;color:var(--muted);font-family:var(--font-mono);}

/* ---------- Article list / cards ---------- */
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:18px;}
.tf-input,.tf-select{
  background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;font-size:12.5px;color:var(--text);font-family:var(--font-body);
}
.tf-input{flex:1;min-width:180px;}
.btn{
  background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;
  font-size:12.5px;font-weight:600;cursor:pointer;font-family:var(--font-body);
  display:inline-flex;align-items:center;gap:6px;transition:filter .15s ease;
}
.btn:hover{filter:brightness(1.1);}
.btn.secondary{background:var(--panel-2);color:var(--text);border:1px solid var(--border);}
.btn.danger{background:var(--danger);}
.btn.ghost{background:none;border:1px solid var(--border);color:var(--muted);}

.article-list{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
.a-card{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:15px 16px;display:flex;gap:14px;cursor:pointer;transition:border-color .15s ease,transform .15s ease;
}
.a-card:hover{border-color:var(--accent-line);transform:translateX(2px);}
.a-cover{width:64px;height:64px;border-radius:8px;background:var(--panel-2);flex-shrink:0;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:var(--muted-2);font-size:10px;font-family:var(--font-mono);}
.a-body{flex:1;min-width:0;}
.a-title-row{display:flex;align-items:center;gap:8px;}
.a-title{font-family:var(--font-display);font-weight:600;font-size:14.5px;}
.a-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.a-meta{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;}
.tag{background:var(--panel-2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:10.5px;color:var(--muted);font-family:var(--font-mono);}
.status-pill{font-size:10px;padding:2px 8px;border-radius:20px;font-family:var(--font-mono);font-weight:600;}
.status-pill.published{background:#4fd18b22;color:var(--good);}
.status-pill.draft{background:#8a8f9922;color:var(--muted);}
.fav-star{margin-left:auto;font-size:16px;color:var(--muted-2);cursor:pointer;flex-shrink:0;align-self:flex-start;}
.fav-star.active{color:#f5c451;}
.date-tag{font-size:11px;color:var(--muted-2);font-family:var(--font-mono);white-space:nowrap;}

.empty-state{
  text-align:center;padding:60px 20px;color:var(--muted);
  border:1px dashed var(--border);border-radius:var(--radius);margin-top:20px;
}
.empty-state .glyph{font-size:30px;margin-bottom:10px;font-family:var(--font-display);color:var(--muted-2);}
.empty-state h3{font-family:var(--font-display);font-size:15px;color:var(--text);margin-bottom:6px;}
.empty-state p{font-size:12.5px;max-width:340px;margin:0 auto;}

/* ---------- Article detail ---------- */
.detail-cover{width:100%;height:220px;border-radius:var(--radius);background:var(--panel-2);background-size:cover;background-position:center;margin-bottom:20px;border:1px solid var(--border);}
.detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;}
.detail-actions{display:flex;gap:8px;flex-shrink:0;}
.detail-body{margin-top:20px;font-size:14px;line-height:1.75;color:var(--text);white-space:pre-wrap;}
.detail-video{margin-top:18px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);}
.detail-video video,.detail-video iframe{width:100%;display:block;aspect-ratio:16/9;}
.ref-list{margin-top:18px;}
.ref-list a{color:var(--accent);font-size:12.5px;display:block;margin-top:6px;word-break:break-all;}

/* ---------- Modal / forms ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);
  display:flex;align-items:flex-start;justify-content:center;z-index:100;
  padding:5vh 20px;overflow-y:auto;
}
.modal{
  background:var(--panel);border:1px solid var(--border);border-radius:14px;
  width:100%;max-width:600px;box-shadow:var(--shadow);
  animation:pop .18s ease;
}
@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:none;}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-head h3{font-family:var(--font-display);font-size:15.5px;}
.modal-body{padding:20px 22px;display:flex;flex-direction:column;gap:14px;max-height:65vh;overflow-y:auto;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.field label{font-size:11.5px;color:var(--muted);display:block;margin-bottom:5px;font-weight:600;}
.field input,.field textarea,.field select{
  width:100%;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;
  padding:9px 11px;color:var(--text);font-size:13px;font-family:var(--font-body);
}
.field textarea{resize:vertical;min-height:80px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.close-x{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;}

/* ---------- Command palette ---------- */
.cp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;justify-content:center;padding-top:10vh;}
.cp-box{width:100%;max-width:560px;background:var(--panel);border:1px solid var(--border);border-radius:12px;height:fit-content;max-height:60vh;display:flex;flex-direction:column;box-shadow:var(--shadow);animation:pop .15s ease;}
.cp-input{padding:16px 18px;border-bottom:1px solid var(--border);font-size:15px;background:none;border:none;color:var(--text);width:100%;font-family:var(--font-body);}
.cp-input:focus{outline:none;}
.cp-results{overflow-y:auto;padding:8px;}
.cp-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;}
.cp-item:hover,.cp-item.sel{background:var(--panel-2);}
.cp-item .nav-badge{width:20px;height:20px;font-size:9.5px;}
.cp-hint{color:var(--muted-2);margin-left:auto;font-size:10.5px;font-family:var(--font-mono);}

/* ---------- Detective board ---------- */
.board-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:20px;}
.board-panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.board-panel h4{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);margin-bottom:10px;}
.board-panel .txt{font-size:13px;line-height:1.65;white-space:pre-wrap;color:var(--text);}
.pin-line{position:relative;padding-left:16px;margin-bottom:10px;font-size:12.5px;}
.pin-line::before{content:'';position:absolute;left:0;top:5px;width:7px;height:7px;border-radius:50%;background:var(--danger);}

/* ---------- Gallery ---------- */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:20px;}
.g-item{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);aspect-ratio:1;background:var(--panel-2);background-size:cover;background-position:center;position:relative;cursor:pointer;}
.g-item .g-cap{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(0,0,0,.75),transparent);color:#fff;font-size:11px;padding:8px;}

/* ---------- Timeline ---------- */
.tl-wrap{position:relative;margin-top:26px;padding-left:26px;}
.tl-wrap::before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--border);}
.tl-item{position:relative;margin-bottom:22px;}
.tl-item::before{content:'';position:absolute;left:-26px;top:4px;width:11px;height:11px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);}
.tl-date{font-family:var(--font-mono);font-size:11px;color:var(--muted);}
.tl-title{font-family:var(--font-display);font-weight:600;font-size:14px;margin-top:3px;}
.tl-cat{font-size:11px;color:var(--accent);font-family:var(--font-mono);}

/* ---------- Journal ---------- */
.j-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.j-date{font-family:var(--font-mono);font-size:11.5px;color:var(--accent);margin-bottom:10px;}
.j-row{margin-bottom:10px;}
.j-row .lbl{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:3px;}
.j-row .val{font-size:13px;line-height:1.6;}

/* ---------- Pagination ---------- */
.pagination{display:flex;gap:6px;justify-content:center;margin-top:24px;}
.pg-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--panel);color:var(--muted);cursor:pointer;font-size:12px;}
.pg-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* ---------- Scroll to top ---------- */
.scrolltop{position:fixed;bottom:24px;right:28px;width:42px;height:42px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:16px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:50;}
.scrolltop.show{opacity:1;pointer-events:auto;}

/* ---------- Toast ---------- */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);padding:10px 18px;border-radius:9px;font-size:12.5px;box-shadow:var(--shadow);z-index:300;opacity:0;transition:opacity .2s ease,transform .2s ease;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

/* ---------- Loader ---------- */
.loader-screen{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .3s ease;}
.loader-mark{width:44px;height:44px;border-radius:12px;background:linear-gradient(145deg,var(--accent),#1f3fae);animation:pulse 1.1s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(.85);opacity:.6;}}
.loader-text{font-family:var(--font-mono);font-size:11.5px;color:var(--muted);}

/* ---------- Responsive ---------- */
@media (max-width:880px){
  .sidebar{position:fixed;z-index:80;transform:translateX(-100%);box-shadow:var(--shadow);}
  .sidebar.open{transform:translateX(0);}
  .menu-btn{display:flex;align-items:center;justify-content:center;}
  .content{padding:20px 16px 60px;}
  .field-row{grid-template-columns:1fr;}
  .board-grid{grid-template-columns:1fr;}
  .breadcrumb{display:none;}
}
.sidebar-scrim{display:none;}
@media (max-width:880px){
  .sidebar-scrim.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:75;}
}
a{color:inherit;}
</style>
</head>
<body>

<div class="loader-screen" id="loaderScreen">
  <div class="loader-mark"></div>
  <div class="loader-text" id="loaderText">Menyiapkan RyanJourney…</div>
</div>

<div id="app" style="display:none;">
  <div class="sidebar-scrim" id="scrim"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <button class="menu-btn icon-btn" id="menuBtn">☰</button>
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="search-shell" id="searchShell">
        <span>⌕</span><span>Cari di seluruh RyanJourney…</span><kbd>⌘K</kbd>
      </div>
      <button class="icon-btn" id="themeBtn" title="Toggle theme">◐</button>
    </div>
    <div class="content" id="content">
      <div class="content-inner" id="contentInner"></div>
    </div>
  </div>
</div>

<button class="scrolltop" id="scrollTopBtn">↑</button>
<div class="toast" id="toast"></div>
<div id="modalRoot"></div>
<div id="cpRoot"></div>

<script>
/* =========================================================
   RyanJourney — Second Brain
   Vanilla JS SPA. Persistence via window.storage (personal, non-shared).
   ========================================================= */

const CATS = [
  { id:'detective', label:'Detective', badge:'DT', group:'Knowledge', type:'detective' },
  { id:'geography', label:'Geography', badge:'GE', group:'Knowledge', type:'generic' },
  { id:'science', label:'Science', badge:'SC', group:'Knowledge', type:'generic' },
  { id:'technology', label:'Technology', badge:'TC', group:'Knowledge', type:'generic' },
  { id:'ai', label:'AI', badge:'AI', group:'Knowledge', type:'generic' },
  { id:'coding', label:'Coding', badge:'</>', group:'Knowledge', type:'generic' },
  { id:'history', label:'History', badge:'HS', group:'Knowledge', type:'generic' },
  { id:'psychology', label:'Psychology', badge:'PS', group:'Knowledge', type:'generic' },
  { id:'philosophy', label:'Philosophy', badge:'PH', group:'Knowledge', type:'generic' },
  { id:'football', label:'Football', badge:'FB', group:'Knowledge', type:'generic' },

  { id:'movie', label:'Movie', badge:'MV', group:'Entertainment', type:'media' },
  { id:'series', label:'Series', badge:'SR', group:'Entertainment', type:'media' },
  { id:'anime', label:'Anime', badge:'AN', group:'Entertainment', type:'media' },
  { id:'books', label:'Books', badge:'BK', group:'Entertainment', type:'generic' },

/* ---------------- Storage ---------------- */
function defaultState(){
  const arts = {};
  CATS.forEach(c=>{ if(c.type==='generic'||c.type==='media') arts[c.id]=[]; });
  return {
    theme:'dark',
    articles: arts,
    detective: [],
    journal: [],
    cerpen: [],
    gallery: [],
    about: { name:'Ryan', bio:'Second brain ini adalah pusat pengetahuan, hobi, penelitian, dan perjalanan hidup saya.', avatar:'' },
    activity: {}, // { 'YYYY-MM-DD': count }
    seeded:false
  };
}

async function loadState(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      STATE = Object.assign(defaultState(), parsed);
      // ensure new categories exist even if storage was from an older version
      CATS.forEach(c=>{ if((c.type==='generic'||c.type==='media') && !STATE.articles[c.id]) STATE.articles[c.id]=[]; });
      return;
    }
  }catch(e){ /* key not found or error -> fall through to seed */ }
  STATE = defaultState();
  seedDemoData();
  await saveState();
}

let saveTimer=null;
async function saveState(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(STATE), false);
  }catch(e){
    console.error('Storage error', e);
    toast('Gagal menyimpan data. Coba lagi.');
  }
}
function saveSoon(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 250);
}

function bumpActivity(){
  const d = new Date().toISOString().slice(0,10);
  STATE.activity[d] = (STATE.activity[d]||0)+1;
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ---------------- Router ---------------- */
function handleRoute(){
  const hash = location.hash.replace(/^#\/?/,'');
  const parts = hash.split('/').filter(Boolean);
  document.getElementById('content').scrollTo({top:0});

  if(parts.length===0 || parts[0]==='home'){ ROUTE={view:'home'}; }
  else if(parts[0]==='timeline'){ ROUTE={view:'timeline'}; }
  else if(parts[0]==='favorites'){ ROUTE={view:'favorites'}; }
  else if(parts[0]==='about'){ ROUTE={view:'about'}; }
  else if(parts[0]==='cat' && parts[1] && CAT_MAP[parts[1]]){ ROUTE={view:'category',cat:parts[1],page:1}; }
  else if(parts[0]==='article' && parts[1] && parts[2]){ ROUTE={view:'article',cat:parts[1],id:parts[2]}; }
  else if(parts[0]==='detective' && parts[1]==='case' && parts[2]){ ROUTE={view:'detectivecase',id:parts[2]}; }
  else if(parts[0]==='detective'){ ROUTE={view:'category',cat:'detective'}; }
  else if(parts[0]==='cerpen' && parts[1]==='story' && parts[2]){ ROUTE={view:'cerpenstory',id:parts[2]}; }
  else if(parts[0]==='journal'){ ROUTE={view:'category',cat:'journal'}; }
  else if(parts[0]==='gallery'){ ROUTE={view:'category',cat:'gallery'}; }
  else { ROUTE={view:'notfound'}; }

  markActiveNav();
  renderBreadcrumb();
  renderView();
}
function goto(hash){ location.hash = hash; }

function renderBreadcrumb(){
  const bc = document.getElementById('breadcrumb');
  let path = 'RyanJourney';
  if(ROUTE.view==='home') path += ' / Home';
  else if(ROUTE.view==='timeline') path += ' / Timeline';
  else if(ROUTE.view==='favorites') path += ' / Favorites';
  else if(ROUTE.view==='about') path += ' / About Me';
  else if(ROUTE.view==='category') path += ' / '+CAT_MAP[ROUTE.cat].label;
  else if(ROUTE.view==='article') path += ' / '+CAT_MAP[ROUTE.cat].label+' / Detail';
  else if(ROUTE.view==='detectivecase') path += ' / Detective / Case';
  else if(ROUTE.view==='cerpenstory') path += ' / Cerpen / Story';
  else path += ' / 404';
  const seg = path.split(' / ');
  bc.innerHTML = seg.map((s,i)=> i===seg.length-1? `<b>${s}</b>` : s).join(' <span style="opacity:.4">/</span> ');
}

function renderView(){
  const root = document.getElementById('contentInner');
  let html='';
  switch(ROUTE.view){
    case 'home': html = viewHome(); break;
    case 'timeline': html = viewTimeline(); break;
    case 'favorites': html = viewFavorites(); break;
    case 'about': html = viewAbout(); break;
    case 'category': html = viewCategory(ROUTE.cat); break;
    case 'article': html = viewArticle(ROUTE.cat, ROUTE.id); break;
    case 'detectivecase': html = viewDetectiveCase(ROUTE.id); break;
    case 'cerpenstory': html = viewCerpenStory(ROUTE.id); break;
    default: html = view404();
  }
  root.innerHTML = html;
  bindViewEvents();
}

/* ---------------- Aggregation helpers ---------------- */
function allArticlesFlat(){
  let out=[];
  CATS.forEach(c=>{
    if(c.type==='generic'||c.type==='media'){
      STATE.articles[c.id].forEach(a=> out.push({cat:c.id, a}));
    }
  });
  return out;
}
function totalArticles(){ return allArticlesFlat().length; }
function totalFavorites(){ return allArticlesFlat().filter(x=>x.a.favorite).length + STATE.detective.filter(d=>d.favorite).length; }
function recentItems(n){
  let flat = allArticlesFlat().map(x=>({date:x.a.date,title:x.a.title,cat:x.cat,id:x.a.id,kind:'article'}));
  flat = flat.concat(STATE.detective.map(d=>({date:d.date,title:d.title,cat:'detective',id:d.id,kind:'case'})));
  flat = flat.concat(STATE.cerpen.map(c=>({date:c.chapters.length?c.chapters[c.chapters.length-1].date:todayISO(),title:c.title,cat:'cerpen',id:c.id,kind:'story'})));
  flat.sort((x,y)=> y.date.localeCompare(x.date));
  return flat.slice(0,n);
}
function weeklyActivity(){
  const days=[];
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const iso = d.toISOString().slice(0,10);
    days.push({ iso, label: d.toLocaleDateString('id-ID',{weekday:'short'}), count: STATE.activity[iso]||0 });
  }
  return days;
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function truncate(s,n){ s=s||''; return s.length>n? s.slice(0,n)+'…' : s; }

/* ---------------- Category dispatcher ---------------- */
let CAT_FILTER = { q:'', tag:'', status:'', page:1 };

function viewCategory(catId){
  const c = CAT_MAP[catId];
  if(c.type==='generic'||c.type==='media') return viewGenericList(c);
  if(c.type==='detective') return viewDetectiveList();
  if(c.type==='cerpen') return viewCerpenList();
  if(c.type==='gallery') return viewGalleryGrid();
  if(c.type==='journal') return viewJournalList();
  return view404();
}

function viewGenericList(c){
  let items = STATE.articles[c.id].slice();
  const allTags = [...new Set(items.flatMap(a=>(a.tags||'').split(',').map(t=>t.trim()).filter(Boolean)))];

  if(CAT_FILTER.q) items = items.filter(a=> (a.title+a.subtitle+a.content).toLowerCase().includes(CAT_FILTER.q.toLowerCase()));
  if(CAT_FILTER.tag) items = items.filter(a=> (a.tags||'').split(',').map(t=>t.trim()).includes(CAT_FILTER.tag));
  if(CAT_FILTER.status) items = items.filter(a=> a.status===CAT_FILTER.status);
  items.sort((a,b)=> b.date.localeCompare(a.date));

  const perPage=8;
  const totalPages = Math.max(1, Math.ceil(items.length/perPage));
  const page = Math.min(CAT_FILTER.page||1, totalPages);
  const pageItems = items.slice((page-1)*perPage, page*perPage);

  return `
    <div class="eyebrow">${c.group}</div>
    <h1 class="page-title">${c.label}</h1>
    <div class="page-sub">${STATE.articles[c.id].length} entri tersimpan di kategori ini.</div>

    <div class="toolbar">
      <input class="tf-input" id="fltSearch" placeholder="Cari di ${c.label}…" value="${escapeHtml(CAT_FILTER.q)}">
      <select class="tf-select" id="fltTag">
        <option value="">Semua tag</option>
        ${allTags.map(t=>`<option value="${escapeHtml(t)}" ${CAT_FILTER.tag===t?'selected':''}>${escapeHtml(t)}</option>`).join('')}
      </select>
      <select class="tf-select" id="fltStatus">
        <option value="">Semua status</option>
        <option value="Draft" ${CAT_FILTER.status==='Draft'?'selected':''}>Draft</option>

      </select>

function articleCardHtml(catId,a){
  const tags = (a.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
  const c = CAT_MAP[catId];
  let extraLine='';
  if(c.type==='media' && a.extra){
    const ex=a.extra;
    const bits=[];
    if(ex.year) bits.push(ex.year);
    if(ex.genre) bits.push(ex.genre);
    if(ex.duration) bits.push(ex.duration+' min');
    if(ex.rating) bits.push('★'.repeat(Number(ex.rating)));
    if(ex.watched!==undefined) bits.push(ex.watched? 'Selesai':'Belum ditonton');
    extraLine = bits.length? `<div class="a-sub">${bits.join(' · ')}</div>`:'';
  }
  return `
    <div class="a-card" data-goto="#/article/${catId}/${a.id}">
      <div class="a-cover" style="${a.cover?`background-image:url('${escapeHtml(a.cover)}')`:''}">${a.cover?'':'—'}</div>
      <div class="a-body">
        <div class="a-title-row"><div class="a-title">${escapeHtml(a.title)}</div></div>
        <div class="a-sub">${escapeHtml(a.subtitle||'')}</div>
        ${extraLine}
        <div class="a-meta">
          <span class="status-pill ${a.status==='Published'?'published':'draft'}">${a.status}</span>
          ${tags.slice(0,4).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
        <span class="fav-star ${a.favorite?'active':''}" data-fav="${catId}:${a.id}">★</span>
        <span class="date-tag">${a.date}</span>
      </div>
    </div>`;
}

function videoEmbed(url){
  if(/youtube\.com|youtu\.be/.test(url)){
    let vid='';
    const m1 = url.match(/[?&]v=([^&]+)/); const m2 = url.match(/youtu\.be\/([^?&]+)/);
    if(m1) vid=m1[1]; else if(m2) vid=m2[1];
    if(vid) return `<iframe src="https://www.youtube.com/embed/${vid}" frameborder="0" allowfullscreen></iframe>`;
  }
  return `<video src="${escapeHtml(url)}" controls></video>`;
}

/* ---------------- View event binding ---------------- */
function bindViewEvents(){
  const root = document.getElementById('contentInner');

  root.querySelectorAll('[data-goto]').forEach(el=>{
    el.addEventListener('click',(e)=>{ location.hash = el.dataset.goto; });
  });

  root.querySelectorAll('[data-fav]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const [cat,id] = el.dataset.fav.split(':');
      const a = findArticle(cat,id);
      a.favorite = !a.favorite; bumpActivity(); saveSoon();
      renderSidebar(); renderView();
    });
  });
  root.querySelectorAll('[data-fav-det]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const d = findCase(el.dataset.favDet);
      d.favorite = !d.favorite; saveSoon(); renderView();
    });
  });

  // filters
  const fltSearch = root.querySelector('#fltSearch');
  if(fltSearch){
    fltSearch.addEventListener('input', ()=>{ CAT_FILTER.q = fltSearch.value; CAT_FILTER.page=1; renderView(); preserveFocus('#fltSearch'); });
  }
  const fltTag = root.querySelector('#fltTag');
  if(fltTag) fltTag.addEventListener('change', ()=>{ CAT_FILTER.tag = fltTag.value; CAT_FILTER.page=1; renderView(); });
  const fltStatus = root.querySelector('#fltStatus');
  if(fltStatus) fltStatus.addEventListener('change', ()=>{ CAT_FILTER.status = fltStatus.value; CAT_FILTER.page=1; renderView(); });
  root.querySelectorAll('[data-page]').forEach(el=>{
    el.addEventListener('click', ()=>{ CAT_FILTER.page = Number(el.dataset.page); renderView(); });
  });

  // new item buttons
  const btnNew = root.querySelector('#btnNewArticle');
  if(btnNew) btnNew.addEventListener('click', ()=> openArticleModal(ROUTE.cat, null));
  const btnNewDet = root.querySelector('#btnNewDetective');
  if(btnNewDet) btnNewDet.addEventListener('click', ()=> openDetectiveModal(null));
  const btnNewCerpen = root.querySelector('#btnNewCerpen');
  if(btnNewCerpen) btnNewCerpen.addEventListener('click', ()=> openCerpenModal(null));
  const btnNewGallery = root.querySelector('#btnNewGallery');
  if(btnNewGallery) btnNewGallery.addEventListener('click', ()=> openGalleryModal());
  const btnNewJournal = root.querySelector('#btnNewJournal');
  if(btnNewJournal) btnNewJournal.addEventListener('click', ()=> openJournalModal(null));
  const btnNewChapter = root.querySelector('#btnNewChapter');
  if(btnNewChapter) btnNewChapter.addEventListener('click', ()=> openChapterModal(btnNewChapter.dataset.story, null));
  const btnEditAbout = root.querySelector('#btnEditAbout');
  if(btnEditAbout) btnEditAbout.addEventListener('click', openAboutModal);

  // edit/delete article
  root.querySelectorAll('[data-edit-article]').forEach(el=>el.addEventListener('click', e=>{
    e.stopPropagation(); const [cat,id]=el.dataset.editArticle.split(':'); openArticleModal(cat,id);
  }));
  root.querySelectorAll('[data-del-article]').forEach(el=>el.addEventListener('click', e=>{
    e.stopPropagation(); const [cat,id]=el.dataset.delArticle.split(':'); confirmDelete('artikel ini', ()=>{
      STATE.articles[cat] = STATE.articles[cat].filter(a=>a.id!==id); saveSoon(); renderSidebar(); goto('#/cat/'+cat);
    });
  }));
  root.querySelectorAll('[data-share]').forEach(el=>el.addEventListener('click', ()=>{
    navigator.clipboard?.writeText(location.href).catch(()=>{});
    toast('Link disalin ke clipboard');
  }));

  // detective
  root.querySelectorAll('[data-edit-detective]').forEach(el=>el.addEventListener('click', e=>{
    e.stopPropagation(); openDetectiveModal(el.dataset.editDetective);
  }));
  root.querySelectorAll('[data-del-detective]').forEach(el=>el.addEventListener('click', e=>{
    e.stopPropagation(); confirmDelete('kasus ini', ()=>{
      STATE.detective = STATE.detective.filter(d=>d.id!==el.dataset.delDetective); saveSoon(); renderSidebar(); goto('#/cat/detective');
    });
  }));

  // cerpen
  root.querySelectorAll('[data-edit-cerpen]').forEach(el=>el.addEventListener('click', e=>{
    e.stopPropagation(); openCerpenModal(el.dataset.editCerpen);
  }));
  root.querySelectorAll('[data-del-cerpen]').forEach(el=>el.addEventListener('click', e=>{
    e.stopPropagation(); confirmDelete('cerita ini', ()=>{
      STATE.cerpen = STATE.cerpen.filter(s=>s.id!==el.dataset.delCerpen); saveSoon(); renderSidebar(); goto('#/cat/cerpen');
    });
  }));
  root.querySelectorAll('[data-edit-chapter]').forEach(el=>el.addEventListener('click', e=>{
    e.stopPropagation(); const [sid,cid]=el.dataset.editChapter.split(':'); openChapterModal(sid,cid);
  }));
  root.querySelectorAll('[data-del-chapter]').forEach(el=>el.addEventListener('click', e=>{
    e.stopPropagation(); const [sid,cid]=el.dataset.delChapter.split(':');
    confirmDelete('bab ini', ()=>{
      const s = findStory(sid); s.chapters = s.chapters.filter(c=>c.id!==cid); saveSoon(); renderView();
    });
  }));

  // journal
  root.querySelectorAll('[data-edit-journal]').forEach(el=>el.addEventListener('click', ()=> openJournalModal(el.dataset.editJournal)));
  root.querySelectorAll('[data-del-journal]').forEach(el=>el.addEventListener('click', ()=>{
    confirmDelete('catatan ini', ()=>{
      STATE.journal = STATE.journal.filter(j=>j.id!==el.dataset.delJournal); saveSoon(); renderSidebar(); renderView();
    });
  }));

  // gallery view (simple lightbox via modal)
  root.querySelectorAll('[data-gallery-view]').forEach(el=>el.addEventListener('click', ()=>{
    const g = STATE.gallery.find(x=>x.id===el.dataset.galleryView);
    openGalleryLightbox(g);
  }));
}
function preserveFocus(sel){
  const el = document.querySelector(sel);
  if(el){ el.focus(); const v=el.value; el.value=''; el.value=v; }
}
function confirmDelete(label, fn){
  openModal(`
    <div class="modal-head"><h3>Hapus ${label}?</h3><button class="close-x" data-close>✕</button></div>
    <div class="modal-body"><div style="font-size:13px;color:var(--muted);">Tindakan ini tidak bisa dibatalkan.</div></div>
    <div class="modal-foot"><button class="btn secondary" data-close>Batal</button><button class="btn danger" id="confirmDelBtn">Hapus</button></div>
  `);
  document.getElementById('confirmDelBtn').addEventListener('click', ()=>{ fn(); closeModal(); toast('Berhasil dihapus'); });
}

/* ---------------- Modal core ---------------- */
function openModal(innerHtml){
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div class="overlay" id="modalOverlay"><div class="modal">${innerHtml}</div></div>`;
  root.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click', closeModal));
  document.getElementById('modalOverlay').addEventListener('click', (e)=>{ if(e.target.id==='modalOverlay') closeModal(); });
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

/* ---------------- Article modal ---------------- */
function openArticleModal(catId, id){
  const c = CAT_MAP[catId];
  const existing = id? findArticle(catId,id) : null;
  const a = existing || { title:'',subtitle:'',date:todayISO(),cover:'',content:'',video:'',links:'',tags:'',status:'Draft',favorite:false,extra:{} };
  const isMedia = c.type==='media';
  openModal(`
    <div class="modal-head"><h3>${existing?'Edit':'Tulis'} ${c.label}</h3><button class="close-x" data-close>✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Judul</label><input id="fTitle" value="${escapeHtml(a.title)}" placeholder="Judul artikel"></div>
      <div class="field"><label>Subjudul</label><input id="fSubtitle" value="${escapeHtml(a.subtitle)}" placeholder="Subjudul singkat"></div>
      <div class="field-row">
        <div class="field"><label>Tanggal</label><input id="fDate" type="date" value="${a.date}"></div>
        <div class="field"><label>Status</label><select id="fStatus"><option ${a.status==='Draft'?'selected':''}>Draft</option><option ${a.status==='Published'?'selected':''}>Published</option></select></div>
      </div>
      <div class="field"><label>URL Gambar Cover (opsional)</label><input id="fCover" value="${escapeHtml(a.cover)}" placeholder="https://…"></div>
      <div class="field"><label>Isi Artikel</label><textarea id="fContent" rows="6" placeholder="Tulis isi artikel di sini…">${escapeHtml(a.content)}</textarea></div>
      <div class="field"><label>URL Video (opsional)</label><input id="fVideo" value="${escapeHtml(a.video)}" placeholder="https://youtube.com/…"></div>
      <div class="field"><label>Link Referensi (pisahkan dengan koma)</label><input id="fLinks" value="${escapeHtml(a.links)}" placeholder="https://…, https://…"></div>
      <div class="field"><label>Tag (pisahkan dengan koma)</label><input id="fTags" value="${escapeHtml(a.tags)}" placeholder="tag1, tag2"></div>
      ${isMedia? `
      <div class="field-row">
        <div class="field"><label>Genre</label><input id="fGenre" value="${escapeHtml(a.extra.genre||'')}"></div>
        <div class="field"><label>Tahun</label><input id="fYear" type="number" value="${a.extra.year||''}"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Durasi (menit)</label><input id="fDuration" type="number" value="${a.extra.duration||''}"></div>
        <div class="field"><label>Rating (1-5)</label><input id="fRating" type="number" min="1" max="5" value="${a.extra.rating||''}"></div>
      </div>
      <div class="field"><label><input type="checkbox" id="fWatched" ${a.extra.watched?'checked':''} style="width:auto;margin-right:6px;">Sudah ditonton</label></div>
      `:''}
    </div>
    <div class="modal-foot">
      <button class="btn secondary" data-close>Batal</button>
      <button class="btn" id="saveArticleBtn">${existing?'Simpan Perubahan':'Publish'}</button>
    </div>
  `);
  document.getElementById('saveArticleBtn').addEventListener('click', ()=>{
    const title = document.getElementById('fTitle').value.trim();
    if(!title){ toast('Judul wajib diisi'); return; }
    const payload = {
      title, subtitle:document.getElementById('fSubtitle').value.trim(),
      date:document.getElementById('fDate').value||todayISO(),
      status:document.getElementById('fStatus').value,
      cover:document.getElementById('fCover').value.trim(),
      content:document.getElementById('fContent').value,
      video:document.getElementById('fVideo').value.trim(),
      links:document.getElementById('fLinks').value.trim(),
      tags:document.getElementById('fTags').value.trim(),
    };
    if(isMedia){
      payload.extra = {
        genre:document.getElementById('fGenre').value.trim(),
        year:document.getElementById('fYear').value,
        duration:document.getElementById('fDuration').value,
        rating:document.getElementById('fRating').value,
        watched:document.getElementById('fWatched').checked
      };
    }
    if(existing){ Object.assign(existing, payload); }
    else { STATE.articles[catId].push(Object.assign({id:uid(),favorite:false,extra:{}}, payload)); }
    bumpActivity(); saveSoon(); renderSidebar(); closeModal();
    toast(existing?'Perubahan disimpan':'Artikel dipublikasikan');
    if(!existing) goto('#/cat/'+catId); else renderView();
  });
}

/* ---------------- Command Palette ---------------- */
function openCommandPalette(){
  CP_INDEX = 0;
  const root = document.getElementById('cpRoot');
  root.innerHTML = `
    <div class="cp-overlay" id="cpOverlay">
      <div class="cp-box">
        <input class="cp-input" id="cpInput" placeholder="Cari artikel, kasus, cerita, atau ketik nama kategori…" autocomplete="off">
        <div class="cp-results" id="cpResults"></div>
      </div>
    </div>`;
  document.getElementById('cpOverlay').addEventListener('click', (e)=>{ if(e.target.id==='cpOverlay') closeCommandPalette(); });
  const input = document.getElementById('cpInput');
  input.addEventListener('input', ()=> renderCpResults(input.value));
  input.addEventListener('keydown', (e)=>{
    const items = [...document.querySelectorAll('.cp-item')];
    if(e.key==='ArrowDown'){ e.preventDefault(); CP_INDEX=Math.min(CP_INDEX+1,items.length-1); highlightCp(items); }
    if(e.key==='ArrowUp'){ e.preventDefault(); CP_INDEX=Math.max(CP_INDEX-1,0); highlightCp(items); }
    if(e.key==='Enter'){ items[CP_INDEX]?.click(); }
  });
  renderCpResults('');
  setTimeout(()=>input.focus(), 30);
}
function closeCommandPalette(){ document.getElementById('cpRoot').innerHTML=''; }
function highlightCp(items){
  items.forEach((it,i)=>it.classList.toggle('sel', i===CP_INDEX));
  items[CP_INDEX]?.scrollIntoView({block:'nearest'});
}
function cpItemHtml(badge,label,sub,href){
  return `<div class="cp-item" data-href="${href}"><span class="nav-badge">${badge}</span><span>${escapeHtml(label)}${sub?`<div style="font-size:10.5px;color:var(--muted);">${escapeHtml(sub)}</div>`:''}</span><span class="cp-hint">↵</span></div>`;
}
function renderCpResults(q){
  const box = document.getElementById('cpResults');
  q = q.trim().toLowerCase();
  let html='';
  if(!q){
    html += `<div class="cp-item" data-href="#/home"><span class="nav-badge">⌂</span>Home<span class="cp-hint">↵</span></div>`;
    CATS.forEach(c=>{ html += cpItemHtml(c.badge, c.label, c.group, '#/cat/'+c.id); });
  } else {
    // category name matches
    CATS.filter(c=>c.label.toLowerCase().includes(q)).forEach(c=>{
      html += cpItemHtml(c.badge, c.label, 'Kategori', '#/cat/'+c.id);
    });
    // articles
    allArticlesFlat().filter(x=> (x.a.title+' '+x.a.subtitle+' '+x.a.tags).toLowerCase().includes(q)).slice(0,20).forEach(x=>{
      html += cpItemHtml(CAT_MAP[x.cat].badge, x.a.title, CAT_MAP[x.cat].label, '#/article/'+x.cat+'/'+x.a.id);
    });
    // detective
    STATE.detective.filter(d=>(d.title+' '+d.summary).toLowerCase().includes(q)).forEach(d=>{
      html += cpItemHtml('DT', d.title, 'Detective case', '#/detective/case/'+d.id);
    });
    // cerpen
    STATE.cerpen.filter(s=>(s.title+' '+s.synopsis).toLowerCase().includes(q)).forEach(s=>{
      html += cpItemHtml('CP', s.title, 'Cerpen', '#/cerpen/story/'+s.id);
    });
  }
  box.innerHTML = html || `<div style="padding:20px;text-align:center;color:var(--muted);font-size:12.5px;">Tidak ada hasil untuk "${escapeHtml(q)}"</div>`;
  box.querySelectorAll('.cp-item').forEach(el=>{
    el.addEventListener('click', ()=>{ location.hash = el.dataset.href; closeCommandPalette(); });
  });
  highlightCp([...box.querySelectorAll('.cp-item')]);
}
